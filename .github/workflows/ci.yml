name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build and test
        run: ./mvnw -B verify
      - name: Compile benchmarks
        run: ./mvnw -B -Pbench -pl jsonweave-benchmarks -am package -DskipTests
