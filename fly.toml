# Fly.io deployment for the Jsonweave playground.
#   fly launch --no-deploy --copy-config   (first time; claims the app name)
#   fly deploy
app = "jsonweave"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # #mvel executes arbitrary Java and cannot be sandboxed - never enable it on a
  # public host. #js runs sandboxed under GraalJS and stays on.
  JSONWEAVE_MVEL = "false"
  JSONWEAVE_JS = "true"

[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle, wake on request: a demo site costs nothing at rest.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 40
    hard_limit = 80

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  timeout = "5s"
  method = "GET"
  path = "/api/examples"

[[vm]]
  size = "shared-cpu-1x"
  # GraalJS in interpreter mode wants headroom; 512MB is comfortable, 256MB is not.
  memory = "512mb"
